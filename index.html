            display: flex;
            flex-direction: column;
        }
        
        header {

            text-align: center;

        }
        
        h1 {

            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffffff, #e8f5e9);

            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {

        }
        
        .container {

        .left-column {

        .stats-box {

            flex-direction: column;

        .share-box {

            height: auto;
            flex: 1;
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(45, 80, 22, 0.08), 0 1px 3px rgba(0, 0, 0, 0.05);

            flex-direction: column;
            gap: 1rem;
        }
        
        .share-box h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #1a3d0d;
            margin: 0;
        }
        
        .share-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .share-btn {

            background: #2d5016;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }
        
        .share-btn:hover {
            background: #1a3d0d;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45, 80, 22, 0.2);
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #2d5016;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #666;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #2d5016, transparent);
        }
        
        #map {
            flex: 0 0 1000px;
            height: 600px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            min-height: 400px;
            width: 100%;
        }
        
        .sidebar {
            width: 300px;
            background: white;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(45, 80, 22, 0.08), 0 1px 3px rgba(0, 0, 0, 0.05);
            overflow-y: auto;
            margin-left: 0;
            display: flex;
            flex-direction: column;
            max-height: 620px;
        }
        
        .sidebar h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #333;
        }
        
        .year-section {
            margin-bottom: 1.5rem;
        }
        
        .year-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: #f0f0f0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            color: #333;
            user-select: none;
            transition: background 0.2s ease;
        }
        
        .year-header:hover {
            background: #e8e8e8;
        }
        
        .year-header .arrow {
            transition: transform 0.3s ease;
            font-size: 1.2rem;
            display: inline-block;
        }
        
        .year-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        
        .year-trips {
            padding-top: 0.5rem;
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .year-trips.collapsed {
            max-height: 0;
            transition: max-height 0.3s ease;
        }
        
        /* Flip Card Styles */
        .flip-card {
            background-color: transparent;
            width: 100%;
            height: 300px;
            perspective: 1000px;
        }
        
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        
        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }
        
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(45, 80, 22, 0.08);
        }
        
        .flip-card-front {
            background: white;
            color: #333;
            border: 2px solid #2d5016;
        }
        
        .flip-card-back {
            background-color: #f0f7f3;
            color: #333;
            border: 2px solid #2d5016;
            transform: rotateY(180deg);
            padding: 0;
            overflow: hidden;
            position: relative;
        }
        
        .flip-card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .flip-card-back-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6), transparent);
            color: white;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }
        
        .flip-card-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(45, 80, 22, 0.9);
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            pointer-events: none;
            opacity: 0;
            animation: fadeInOut 3s ease-in-out infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

            line-height: 1.3;

            color: #2d5016;
            text-decoration: none;

            { name: 'Edmonton, Alberta', coords: [53.5461, -113.4938], year: 2026, description: 'Canada\'s capital of Alberta with river valley', albumId: 'edmonton', country: 'Canada' },

            { name: 'Rochester, Minnesota', coords: [44.0065, -92.4830], year: 2026, description: 'Mayo Clinic city with medical heritage', albumId: 'rochester-mn', country: 'USA' },
            { name: 'Seward, Alaska', coords: [60.1023, -149.4269], year: 2026, description: 'Scenic Alaska coastal town with glacier access', albumId: 'seward', country: 'USA' },
            { name: 'Talkeetna, Alaska', coords: [62.3226, -150.1064], year: 2026, description: 'Quirky Alaska town with mountain views', albumId: 'talkeetna', country: 'USA' },
            { name: 'Toronto, Ontario', coords: [43.6532, -79.3832], year: 2026, description: 'Canada\'s largest city with CN Tower and culture', albumId: 'toronto', country: 'Canada' },
            { name: 'Vancouver, BC', coords: [49.2827, -123.1207], year: 2026, description: 'Pacific Coast city with mountains and diversity', albumId: 'vancouver-bc', country: 'Canada' },
            { name: 'Victoria, BC', coords: [48.4281, -123.3656], year: 2026, description: 'British Columbia\'s capital on Vancouver Island', albumId: 'victoria-bc', country: 'Canada' },
            { name: 'Wellington, New Zealand', coords: [-41.2865, 174.7762], year: 2026, description: 'Capital city nestled between harbor and hills', albumId: 'wellington', country: 'New Zealand' }
        ];
        
        // Check if we're on a location detail page
        const urlParams = new URLSearchParams(window.location.search);
        const locationIndex = urlParams.get('location');
        const viewType = urlParams.get('view');
        
        if (viewType === 'all-locations') {
            renderAllLocationsPage();
        } else if (locationIndex !== null) {
            showLocationDetail(parseInt(locationIndex));
        } else {
            // Show home page with map
            initializeMap();
        }
        
        function initializeMap() {
            document.getElementById('map').style.display = 'block';
            document.getElementById('locationsList').parentElement.parentElement.style.display = 'flex';
            document.getElementById('location-detail').style.display = 'none';
            
            // Initialize map
            globalMap = L.map('map', {
                worldCopyJump: false,
                maxBounds: [[-85, -180], [85, 180]],
                minZoom: 2,
                maxZoom: 19
            }).setView([20, 0], 2);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19,
                noWrap: true,
                backgroundColor: '#87CEEB'
            }).addTo(globalMap);
            
            // Set map background
            globalMap.getContainer().style.backgroundColor = '#87CEEB';
            
            // Fix map on resize
            setTimeout(() => {
                globalMap.invalidateSize();
            }, 100);
            
            window.addEventListener('resize', () => {
                if (globalMap) {
                    globalMap.invalidateSize();
                }
            });
            
            addMarkers();
            renderLocations();
        }
        
        function addMarkers() {
            locations.forEach((location, index) => {
                const marker = L.marker(location.coords)
                    .bindPopup(`<strong>${location.name}</strong>`)
                    .addTo(globalMap);
                
                marker.on('click', () => openLocationDetail(index));
                markers.push(marker);
            });
        }
        
        function openLocationDetail(index) {
            window.location.href = '?location=' + index;
        }
        
        function showLocationDetail(index) {
            const location = locations[index];
            document.getElementById('map').style.display = 'none';
            document.getElementById('locationsList').parentElement.parentElement.style.display = 'none';
            
            const detailPage = document.getElementById('location-detail');
            detailPage.style.display = 'block';
            
            const albumLink = albums[location.albumId] || '#';
            let photoGallery = '';
            
            // Determine where to go back to
            const urlParams = new URLSearchParams(window.location.search);
            const comingFromList = urlParams.get('from') === 'list';
            const backLink = comingFromList ? '?view=all-locations' : '?';
            
            // Add embedded Google Drive folder if available
            if (location.driveFolder) {
                photoGallery = `
                    <div style="margin-top: 2rem; margin-bottom: 2rem;">
                        <h3 style="font-size: 1.5rem; margin-bottom: 1rem; color: #333;">Photos</h3>
                        <a href="${albumLink}" target="_blank" style="display: inline-block; padding: 0.75rem 1.5rem; background: #2d5016; color: white; text-decoration: none; border-radius: 6px; font-size: 1rem; font-weight: 600; margin-bottom: 1rem;">View Full Album on Google Drive →</a>
                        <div style="position: relative; width: 100%; padding-bottom: 66%; background: #f5f5f5; border: 2px solid #2d5016; border-radius: 8px; overflow: hidden;">
                            <iframe src="https://drive.google.com/embeddedfolderview?id=${location.driveFolder}#grid" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 8px;" allow="autoplay"></iframe>
                        </div>
                    </div>
                `;
            }
            
            detailPage.innerHTML = `
                <div style="padding: 2rem; background: white;">
                    <button onclick="window.location.href='${backLink}'" style="margin-bottom: 1rem; padding: 0.75rem 1.5rem; background: #2d5016; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem;">← Back</button>
                    <h2 style="font-size: 2rem; margin-bottom: 1rem; color: #333;">${location.name}</h2>
                    <p style="font-size: 1.1rem; color: #666; margin-bottom: 1.5rem;">${location.description}</p>
                    ${photoGallery}
                    ${!location.driveFolder ? `<a href="${albumLink}" target="_blank" style="display: inline-block; padding: 1rem 2rem; background: #2d5016; color: white; text-decoration: none; border-radius: 6px; font-size: 1.1rem; font-weight: 600; margin-top: 1rem;">View Full Album on Google Drive →</a>` : ''}
                </div>
            `;
        }
        
        function copyLinkToClipboard() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('Link copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }
        
        function renderLocations() {
            const list = document.getElementById('locationsList');
            list.innerHTML = '';
            
            // Sort locations alphabetically by name
            const sortedLocations = locations.map((location, index) => ({ location, index }))
                .sort((a, b) => a.location.name.localeCompare(b.location.name));
            
            const showInitial = 6;
            
            // Display first 6 locations
            for (let i = 0; i < Math.min(showInitial, sortedLocations.length); i++) {
                const { location, index } = sortedLocations[i];
                addLocationCard(list, location, index);
            }
            
            // Add "Show More" button if there are more than 6 locations
            if (sortedLocations.length > showInitial) {
                const showMoreBtn = document.createElement('button');
                showMoreBtn.style.cssText = 'width: 100%; padding: 0.75rem; margin-top: 1rem; background: #2d5016; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: background 0.2s ease;';
                showMoreBtn.textContent = `Show more (${sortedLocations.length - showInitial} more locations)`;
                showMoreBtn.onmouseover = () => showMoreBtn.style.background = '#1a3d0d';
                showMoreBtn.onmouseout = () => showMoreBtn.style.background = '#2d5016';
                
                showMoreBtn.onclick = () => {
                    // Navigate to expanded view by adding view parameter
                    window.location.href = '?view=all-locations';
                };
                
                list.appendChild(showMoreBtn);
            }
        }
        
        function renderAllLocationsPage() {
            const mainContainer = document.querySelector('.container');
            mainContainer.style.display = 'none';
            
            const detailPage = document.getElementById('location-detail');
            detailPage.style.display = 'block';
            detailPage.style.padding = '0';
            detailPage.style.background = 'white';
            detailPage.style.minHeight = '100vh';
            
            // Sort locations alphabetically
            const sortedLocations = locations.map((location, index) => ({ location, index }))
                .sort((a, b) => a.location.name.localeCompare(b.location.name));
            
            let html = `
                <div style="position: sticky; top: 0; background: white; padding: 2rem; padding-bottom: 1rem; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <button onclick="window.location.href='?'" style="padding: 0.75rem 1.5rem; background: #2d5016; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 500;">← Back to Map</button>
                </div>
                <div style="padding: 2rem; padding-top: 1rem;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
            `;
            
            sortedLocations.forEach(({ location, index }) => {
                const albumLink = albums[location.albumId] || '#';
                const emoji = location.country === 'USA' ? '🇺🇸' : '🌍';
                
                // Regular card version for all locations
                html += `
                    <div style="border: 2px solid #2d5016; border-radius: 12px; padding: 1.5rem; cursor: pointer; transition: all 0.3s ease; background: white; box-shadow: 0 2px 8px rgba(45, 80, 22, 0.08);" onclick="window.location.href='?location=${index}&from=list'">
                        <h2 style="font-size: 1.2rem; margin-bottom: 0.5rem; color: #333;">${emoji} ${location.name}</h2>
                        <p style="font-size: 0.95rem; color: #666; margin-bottom: 1rem;">${location.description}</p>
                        <a href="${albumLink}" target="_blank" style="display: inline-block; color: #2d5016; text-decoration: none; font-weight: 500;" onclick="event.stopPropagation();">View photos →</a>
                    </div>
                `;
            });
            
            html += `</div></div>`;
            detailPage.innerHTML = html;
        }
        
        function addLocationCard(list, location, index) {
            const card = document.createElement('div');
            card.className = 'location-card';
            card.style.cursor = 'pointer';
            const albumLink = albums[location.albumId] || '#';
            card.innerHTML = `
                <h3>${location.name}</h3>
                <a href="${albumLink}" target="_blank" class="location-link" onclick="event.stopPropagation();">View photos →</a>
            `;
            card.addEventListener('click', () => openLocationDetail(index));
            list.appendChild(card);
        }
    </script>
